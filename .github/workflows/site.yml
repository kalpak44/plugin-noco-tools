name: site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/noco-tools-site

jobs:
  docker:
    name: build & push site image
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      digest:    ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: site
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image report
        run: |
          {
            echo "## Site image"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE }}\` |"
            echo "| **Tag** | \`${{ steps.sha.outputs.short }}\` |"
            echo "| **Also tagged** | \`latest\` |"
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |"
            echo "| **Commit** | [\`${{ steps.sha.outputs.short }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "### Pull"
            echo '```'
            echo "docker pull ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}"
            echo '```'
            echo ""
            echo "### Run locally"
            echo '```'
            echo "docker run --rm -p 8080:80 ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"