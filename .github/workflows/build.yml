name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  tarball:
    name: build .tgz
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NocoBase CLI
        run: npm i -g @nocobase/cli

      - name: Cache local dev app
        id: cache-app
        uses: actions/cache@v4
        with:
          path: app
          key: nocobase-app-${{ runner.os }}-v1-${{ hashFiles('package.json') }}
          restore-keys: |
            nocobase-app-${{ runner.os }}-v1-

      - name: Bootstrap dev app + build .tgz
        run: bash scripts/build-tgz.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-tgz
          path: dist/*.tgz
          if-no-files-found: error

      - name: Attach to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz