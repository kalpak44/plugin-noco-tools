name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'site/**'
      - '.github/workflows/site.yml'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'site/**'
      - '.github/workflows/site.yml'
      - '**.md'
  workflow_dispatch: { }

permissions:
  contents: write

jobs:
  tarball:
    name: build .tgz
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NocoBase CLI globally
        run: npm i -g @nocobase/cli

      - name: Cache local dev app
        id: cache-app
        uses: actions/cache@v4
        with:
          # build.sh short-circuits the `nb source download` step when
          # app/source/package.json is already there; the plugin dir is always
          # rsynced fresh so a stale plugin copy isn't a risk.
          path: app/source
          key: nocobase-source-${{ runner.os }}-v5-${{ hashFiles('package.json', 'scripts/build.sh') }}
          restore-keys: |
            nocobase-source-${{ runner.os }}-v5-

      - name: Build .tgz
        run: npm run build

      - name: Inspect artifact
        run: |
          ls -la dist/
          tar tzf dist/*.tgz | head -30
          echo "---package.json inside tgz---"
          tar xOzf dist/*.tgz package/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-tgz
          path: dist/*.tgz
          if-no-files-found: error

      - name: Attach to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
