name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  tarball:
    name: build .tgz
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NocoBase CLI globally
        run: npm i -g @nocobase/cli

      - name: Cache local dev app
        id: cache-app
        uses: actions/cache@v4
        with:
          # Everything under app/source except the plugin dir we sync fresh each build.
          path: |
            app/source/node_modules
            app/source/package.json
            app/source/yarn.lock
          key: nocobase-source-${{ runner.os }}-v2-${{ hashFiles('package.json') }}
          restore-keys: |
            nocobase-source-${{ runner.os }}-v2-

      - name: Build .tgz
        run: bash scripts/build-tgz.sh

      - name: Inspect artifact
        run: |
          ls -la dist/
          tar tzf dist/*.tgz | head -30
          echo "---package.json inside tgz---"
          tar xOzf dist/*.tgz package/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-tgz
          path: dist/*.tgz
          if-no-files-found: error

      - name: Attach to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz